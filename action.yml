name: "EPICON Guard"
description: >-
  Validates EPICON-02 Intent Publication blocks in pull request bodies and
  classifies PRs into EP-1/EP-2/EP-3 consequence tiers per the Mobius Substrate
  EPICON Tiering Specification. No consequential action without recorded intent.
author: "kaizencycle (Mobius Substrate)"
branding:
  icon: "shield"
  color: "purple"

inputs:
  github-token:
    description: "Token used to list PR changed files (read-only). Defaults to the workflow token."
    required: false
    default: ${{ github.token }}
  mode:
    description: "enforce (fail the check on QUARANTINE/FAIL_CLOSED) or warn (report only)."
    required: false
    default: "enforce"

outputs:
  tier:
    description: "Policy-classified EPICON tier for this PR (EP-1 | EP-2 | EP-3)."
    value: ${{ steps.guard.outputs.tier }}
  status:
    description: "PASS | PASS_WITH_BACKFILL | QUARANTINE | FAIL_CLOSED."
    value: ${{ steps.guard.outputs.status }}
  epicon_id:
    description: "The published epicon_id, if any."
    value: ${{ steps.guard.outputs.epicon_id }}
  justification_hash:
    description: "SHA-256 of the published intent block (EPICON-02 justification_hash, immutability witness)."
    value: ${{ steps.guard.outputs.justification_hash }}
  divergence_count:
    description: "Number of changed files outside the declared scope envelope (I4)."
    value: ${{ steps.guard.outputs.divergence_count }}

runs:
  using: "composite"
  steps:
    - name: EPICON Guard
      id: guard
      shell: bash
      env:
        INPUT_GITHUB_TOKEN: ${{ inputs.github-token }}
        INPUT_MODE: ${{ inputs.mode }}
      run: node "${{ github.action_path }}/src/validate.mjs"
