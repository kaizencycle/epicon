# Basic Intent Example
# Use this as a template for simple feature additions

EPICON INTENT PUBLICATION

ledger_id: myorg:myproject:feature-name
scope: core
mode: normal
issued_at: 2025-12-22T10:00:00Z
expires_at: 2026-01-22T10:00:00Z

justification: |
  Brief description of what you're doing and why.
  
  CONTEXT:
  - What problem does this solve?
  - What's the business justification?
  - Who requested this change?
  
  DECISION:
  - What approach did you choose?
  - What alternatives did you consider?
  - Why this approach over others?
  
  IMPACT:
  - Who will this affect?
  - What systems does this touch?
  - Any performance implications?

counterfactuals:
  - If this breaks production, revert immediately
  - If users report issues, investigate within 24h
  - Review effectiveness after 30 days
