# Feature Flag Example
# Use this template for feature rollouts

EPICON INTENT PUBLICATION

ledger_id: myorg:myproject:feature-new-dashboard-ui
scope: core
mode: normal
issued_at: 2025-12-22T10:00:00Z
expires_at: 2026-03-22T10:00:00Z  # 90-day evaluation period

justification: |
  Rolling out new dashboard UI behind feature flag.
  
  CONTEXT:
  - User research showed 73% want simpler dashboard
  - Current dashboard has 12% bounce rate
  - Target: reduce bounce rate to <8%
  
  ROLLOUT PLAN:
  - Week 1: Internal team (100 users)
  - Week 2: Beta users (1,000 users)
  - Week 4: 10% of users (10,000 users)
  - Week 8: 50% of users (50,000 users)
  - Week 12: 100% if successful
  
  SUCCESS CRITERIA:
  - Bounce rate <8%
  - NPS score >7
  - <5 critical bugs
  - Performance within 10% of current
  
  DECISION TIMELINE:
  - Week 4: Review metrics, decide on 50% rollout
  - Week 8: Review metrics, decide on 100% rollout
  - Week 12: Make permanent or revert

counterfactuals:
  - If bounce rate doesn't improve by week 4, pause rollout
  - If NPS drops below 6, investigate immediately
  - If critical bugs exceed 5, rollback to 10%
  - If performance degrades >10%, optimize before continuing
  - If <100 users adopt by week 2, reconsider approach
  - After 90 days, make decision to keep or remove
