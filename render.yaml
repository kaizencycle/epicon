# Render Blueprint — EPICON Guard GitHub App webhook endpoint.
#
# Hosts POST /api/github/webhook (see packages/github-app). The service binds
# 0.0.0.0:$PORT and has zero runtime dependencies. After deploy, point the
# GitHub App webhook URL at https://<service-host>/api/github/webhook (or the
# custom domain epicon.mobius-substrate.com mapped to this service) and set
# GITHUB_WEBHOOK_SECRET to the same secret configured on the GitHub App.
services:
  - type: web
    name: epicon-github-webhook
    runtime: node
    plan: free
    rootDir: packages/github-app
    buildCommand: npm install
    startCommand: node src/server.mjs
    healthCheckPath: /healthz
    autoDeploy: false
    envVars:
      # Set this in the Render dashboard — must match the GitHub App's secret.
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
